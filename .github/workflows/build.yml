    async def launch_local_chrome(self, playwright):
        """尝试启动本地Chrome"""
        launch_options = {
            "headless": self.config["headless"],
            "args": [
                '--ignore-certificate-errors',
                '--ignore-certificate-errors-spki-list',
                '--disable-web-security',
                '--no-first-run',
                '--no-default-browser-check'
            ],
            "slow_mo": self.config["slow_mo"]
        }
        
        # 方法1：使用 channel="chrome"（Playwright自动找系统Chrome）
        try:
            self.log("尝试通过channel启动Chrome...")
            browser = await playwright.chromium.launch(
                **launch_options,
                channel="chrome"
            )
            self.log("✓ 成功连接到系统Chrome")
            return browser
        except Exception as e:
            self.log(f"channel方式失败: {e}")
        
        # 方法2：手动指定常见Chrome路径
        chrome_paths = [
            # Windows 默认路径
            r"C:\Program Files\Google\Chrome\Application\chrome.exe",
            r"C:\Program Files (x86)\Google\Chrome\Application\chrome.exe",
            # 用户级安装
            os.path.expandvars(r"%LOCALAPPDATA%\Google\Chrome\Application\chrome.exe"),
            # 其他可能位置
            r"D:\Program Files\Google\Chrome\Application\chrome.exe",
        ]
        
        for chrome_path in chrome_paths:
            if os.path.exists(chrome_path):
                try:
                    self.log(f"尝试指定路径: {chrome_path}")
                    browser = await playwright.chromium.launch(
                        **launch_options,
                        executable_path=chrome_path
                    )
                    self.log(f"✓ 成功使用Chrome: {chrome_path}")
                    return browser
                except Exception as e:
                    self.log(f"该路径失败: {e}")
                    continue
        
        return None
